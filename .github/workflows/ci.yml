name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel obsolete in-flight runs for the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (mocked; no live PubChem calls)
        env:
          PUBCHEM_MCP_LIVE_TESTS: ''
        run: npm test

      - name: Production audit
        run: npm audit --omit=dev

      - name: Package metadata sanity
        run: npm run check:metadata

      - name: Pack (dry-run)
        run: npm pack --dry-run

      - name: MCP stdio smoke (mocked; no network)
        run: npm run smoke:mcp
